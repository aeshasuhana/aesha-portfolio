<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent | Aesha Suhana</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f7f8fc;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }
    .thankyou-card{
      background:#fff;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      max-width:600px;
      text-align:center;
    }
    .thankyou-card h1{
      margin-bottom:12px;
      color:#222;
    }
    .thankyou-card p{
      color:#555;
      line-height:1.6;
    }
    .thankyou-card a{
      display:inline-block;
      margin-top:20px;
      text-decoration:none;
      padding:12px 22px;
      border-radius:12px;
      background:#5b4df7;
      color:#fff;
      font-weight:600;
    }

<body>
  <div class="thankyou-card">
    <h1>Message Sent Successfully</h1>
